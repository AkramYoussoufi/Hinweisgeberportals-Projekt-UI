<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hinweisgeberportal</title>
    <script src="https://cdn.webix.com/edge/webix.js"></script>
    <link rel="stylesheet" href="https://cdn.webix.com/edge/webix.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="js/config.js"></script>
    <script src="js/lang/de.js"></script>
    <script src="js/api.js"></script>
    <link rel="stylesheet" href="css/custom.css" />
    <style>
      .track-wrap {
        max-width: 720px;
        margin: 40px auto;
        padding: 0 24px;
      }
      .section {
        display: none;
      }
      .section.active {
        display: block;
      }
      .report-header {
        background: #1a237e;
        color: #fff;
        border-radius: 8px 8px 0 0;
        padding: 20px 24px;
      }
      .report-header h2 {
        font-size: 18px;
        margin-bottom: 4px;
      }
      .report-header p {
        font-size: 13px;
        opacity: 0.75;
      }
      .report-body {
        background: #fff;
        border-radius: 0 0 8px 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        padding: 24px;
        margin-bottom: 24px;
      }
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 20px;
      }
      .info-item label {
        font-size: 11px;
        font-weight: 600;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: block;
        margin-bottom: 4px;
      }
      .info-item span {
        font-size: 14px;
        color: #333;
        font-weight: 500;
      }
      .tab-bar {
        display: flex;
        border-bottom: 2px solid #e0e0e0;
        margin-bottom: 20px;
      }
      .tab-btn {
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        color: #999;
        border: none;
        background: none;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: color 0.2s;
      }
      .tab-btn.active {
        color: #1a237e;
        border-bottom-color: #1a237e;
      }
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }
      .message-thread {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 16px;
        height: 300px;
        overflow-y: auto;
        background: #fafafa;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .message-bubble {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.5;
      }
      .message-admin {
        background: #e3f2fd;
        color: #1a237e;
        align-self: flex-start;
        border-bottom-left-radius: 2px;
      }
      .message-whistleblower {
        background: #1a237e;
        color: #fff;
        align-self: flex-end;
        border-bottom-right-radius: 2px;
      }
      .message-time {
        font-size: 10px;
        opacity: 0.6;
        margin-top: 4px;
        text-align: right;
      }
      .message-input-row {
        display: flex;
        gap: 8px;
      }
      .message-input-row input {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
      }
      .message-input-row input:focus {
        outline: none;
        border-color: #1a237e;
      }
      .attachment-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .attachment-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: #f5f5f5;
        border-radius: 6px;
        font-size: 13px;
      }
      .attachment-item span {
        color: #333;
      }
      .attachment-item button {
        background: #1a237e;
        color: #fff;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
      }
      .attachment-item button:hover {
        background: #283593;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #444;
        margin-bottom: 6px;
      }
      .form-group input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
      }
      .form-group input:focus {
        outline: none;
        border-color: #1a237e;
      }
      .btn {
        padding: 10px 24px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
      }
      .btn-blue {
        background: #1a237e;
        color: #fff;
      }
      .btn-blue:hover {
        background: #283593;
      }
      .btn-gray {
        background: #f5f5f5;
        color: #333;
        border: 1px solid #ddd;
      }
      .btn-gray:hover {
        background: #eeeeee;
      }
      .empty-state {
        text-align: center;
        padding: 32px;
        color: #999;
        font-size: 14px;
      }
      @media (max-width: 600px) {
        .info-grid {
          grid-template-columns: 1fr;
        }
        .message-bubble {
          max-width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div class="logo">
        <i class="fa-solid fa-shield-halved"></i>
        <span data-i18n="app_name"></span>
      </div>
      <div class="header-actions">
        <button
          class="lang-switcher"
          onclick="switchLang()"
          data-i18n="lang_switch"
        ></button>
        <button
          class="btn-outline"
          style="padding: 6px 16px; font-size: 13px"
          onclick="window.location.href = 'index.html'"
        >
          <i class="fa-solid fa-house"></i>
          <span data-i18n="home"></span>
        </button>
      </div>
    </header>

    <div class="track-wrap">
      <div class="section active" id="sectionLogin">
        <div class="card" style="max-width: 480px; margin: 0 auto">
          <h2 class="card-title">
            <i class="fa-solid fa-magnifying-glass" style="color: #1a237e"></i>
            <span data-i18n="track_title"></span>
          </h2>
          <p class="card-subtitle" data-i18n="track_subtitle"></p>

          <div class="form-group">
            <label data-i18n="label_token"></label>
            <input
              type="text"
              id="inputToken"
              data-i18n-placeholder="placeholder_token"
            />
          </div>
          <div class="form-group">
            <label data-i18n="label_pin"></label>
            <input
              type="text"
              id="inputPin"
              data-i18n-placeholder="placeholder_pin"
              maxlength="6"
            />
          </div>

          <button
            class="btn btn-blue"
            style="width: 100%"
            onclick="doAnonLogin()"
          >
            <i class="fa-solid fa-right-to-bracket"></i>
            <span data-i18n="btn_access_report"></span>
          </button>

          <div
            style="
              text-align: center;
              margin-top: 16px;
              font-size: 13px;
              color: #999;
            "
          >
            <span data-i18n="have_account"></span>
            <a
              href="dashboard.html"
              style="color: #1a237e; text-decoration: none; font-weight: 600"
              data-i18n="login"
            ></a>
          </div>
        </div>
      </div>

      <div class="section" id="sectionReport">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
          "
        >
          <div>
            <h2
              style="font-size: 20px; color: #1a237e; font-weight: 700"
              data-i18n="your_report"
            ></h2>
            <p style="font-size: 13px; color: #999" id="reportRef"></p>
          </div>
          <button class="btn btn-gray" onclick="doLogout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span data-i18n="logout"></span>
          </button>
        </div>

        <div class="report-header">
          <h2 id="reportSubject"></h2>
          <p id="reportStatus"></p>
        </div>

        <div class="report-body">
          <div class="info-grid">
            <div class="info-item">
              <label data-i18n="label_category"></label>
              <span id="reportCategory"></span>
            </div>
            <div class="info-item">
              <label data-i18n="label_incident_date"></label>
              <span id="reportDate"></span>
            </div>
            <div class="info-item">
              <label data-i18n="label_incident_location"></label>
              <span id="reportLocation"></span>
            </div>
            <div class="info-item">
              <label data-i18n="label_involved_persons"></label>
              <span id="reportPersons"></span>
            </div>
          </div>

          <div style="margin-bottom: 16px">
            <label
              style="
                font-size: 11px;
                font-weight: 600;
                color: #999;
                text-transform: uppercase;
                letter-spacing: 0.5px;
              "
              data-i18n="label_description"
            ></label>
            <p
              id="reportDescription"
              style="
                font-size: 14px;
                color: #333;
                margin-top: 6px;
                line-height: 1.6;
              "
            ></p>
          </div>

          <div class="tab-bar">
            <button
              class="tab-btn active"
              onclick="switchTab('messages')"
              data-i18n="messages"
            ></button>
            <button
              class="tab-btn"
              onclick="switchTab('attachments')"
              data-i18n="attachments"
            ></button>
          </div>

          <div class="tab-panel active" id="tabMessages">
            <div class="message-thread" id="messageThread">
              <div class="empty-state" data-i18n="no_messages"></div>
            </div>
            <div class="message-input-row" id="messageInputRow">
              <input
                type="text"
                id="messageInput"
                data-i18n-placeholder="type_message"
                onkeypress="if (event.key === 'Enter') sendMessage();"
              />
              <button class="btn btn-blue" onclick="sendMessage()">
                <i class="fa-solid fa-paper-plane"></i>
              </button>
            </div>
          </div>

          <div class="tab-panel" id="tabAttachments">
            <div class="attachment-list" id="attachmentList">
              <div class="empty-state" data-i18n="no_attachments"></div>
            </div>
            <div style="margin-top: 16px">
              <input
                type="file"
                id="newAttachment"
                accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.gif,.mp4,.mp3,.wav"
                style="display: none"
                onchange="uploadAttachment()"
              />
              <button
                class="btn btn-gray"
                onclick="document.getElementById('newAttachment').click()"
              >
                <i class="fa-solid fa-paperclip"></i>
                <span data-i18n="attach_file"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      api.init();
      let currentLang = "de";
      let currentReport = null;

      const EXTRA_LANG = {
        de: {
          home: "Startseite",
          track_title: "Hinweis verfolgen",
          track_subtitle:
            "Geben Sie Ihren Token und Ihre PIN ein, um Ihren Hinweis aufzurufen.",
          placeholder_token: "Ihr anonymer Token",
          placeholder_pin: "6-stellige PIN",
          btn_access_report: "Hinweis aufrufen",
          have_account: "Sie haben ein Konto? ",
          your_report: "Ihr Hinweis",
          no_attachments: "Keine Anhänge vorhanden.",
          status_received: "Eingegangen",
          status_reviewing: "In Prüfung",
          status_clarification: "Rückfrage",
          status_closed: "Abgeschlossen",
          cat_fraud: "Betrug",
          cat_harassment: "Belästigung",
          cat_safety: "Sicherheit",
          cat_discrimination: "Diskriminierung",
          cat_other: "Sonstiges",
          download: "Herunterladen",
          err_fill_all: "Bitte füllen Sie alle Felder aus.",
          err_login_failed: "Ungültiger Token oder PIN.",
          err_generic: "Ein Fehler ist aufgetreten.",
          error_title: "Fehler",
          warning_title: "Hinweis",
          success_sent: "Nachricht gesendet.",
          confirm_logout: "Möchten Sie sich wirklich abmelden?",
          type_message: "Nachricht eingeben...",
          messages: "Nachrichten",
          attachments: "Anhänge",
          no_messages: "Noch keine Nachrichten.",
          attach_file: "Datei anhängen",
          label_category: "Kategorie",
          label_incident_date: "Datum des Vorfalls",
          label_incident_location: "Ort des Vorfalls",
          label_involved_persons: "Beteiligte Personen",
          label_description: "Beschreibung",
          label_token: "Token",
          label_pin: "PIN",
          lang_switch: "EN",
          app_name: "Hinweisgeberportal",
          login: "Anmelden",
          logout: "Abmelden",
        },
        en: {
          home: "Home",
          track_title: "Track Your Report",
          track_subtitle: "Enter your token and PIN to access your report.",
          placeholder_token: "Your anonymous token",
          placeholder_pin: "6-digit PIN",
          btn_access_report: "Access Report",
          have_account: "Have an account? ",
          your_report: "Your Report",
          no_attachments: "No attachments found.",
          status_received: "Received",
          status_reviewing: "Under Review",
          status_clarification: "Clarification Needed",
          status_closed: "Closed",
          cat_fraud: "Fraud",
          cat_harassment: "Harassment",
          cat_safety: "Safety",
          cat_discrimination: "Discrimination",
          cat_other: "Other",
          download: "Download",
          err_fill_all: "Please fill in all fields.",
          err_login_failed: "Invalid token or PIN.",
          err_generic: "An error occurred.",
          error_title: "Error",
          warning_title: "Warning",
          success_sent: "Message sent.",
          confirm_logout: "Are you sure you want to logout?",
          type_message: "Type a message...",
          messages: "Messages",
          attachments: "Attachments",
          no_messages: "No messages yet.",
          attach_file: "Attach File",
          label_category: "Category",
          label_incident_date: "Date of Incident",
          label_incident_location: "Location of Incident",
          label_involved_persons: "Involved Persons",
          label_description: "Description",
          label_token: "Token",
          label_pin: "PIN",
          lang_switch: "DE",
          app_name: "Whistleblower Portal",
          login: "Login",
          logout: "Logout",
        },
      };

      let L = EXTRA_LANG.de;

      function applyLang() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (L[key] !== undefined) el.textContent = L[key];
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
          const key = el.getAttribute("data-i18n-placeholder");
          if (L[key] !== undefined) el.placeholder = L[key];
        });
        document.title = L.app_name;
      }

      function switchLang() {
        currentLang = currentLang === "de" ? "en" : "de";
        L = EXTRA_LANG[currentLang];
        applyLang();
        if (currentReport) renderReport(currentReport);
      }

      function showSection(id) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      function switchTab(tab) {
        document.querySelectorAll(".tab-btn").forEach((b, i) => {
          b.classList.toggle(
            "active",
            (i === 0 && tab === "messages") ||
              (i === 1 && tab === "attachments"),
          );
        });
        document
          .getElementById("tabMessages")
          .classList.toggle("active", tab === "messages");
        document
          .getElementById("tabAttachments")
          .classList.toggle("active", tab === "attachments");
      }

      async function doAnonLogin() {
        const token = document.getElementById("inputToken").value.trim();
        const pin = document.getElementById("inputPin").value.trim();
        if (!token || !pin)
          return Swal.fire(L.warning_title, L.err_fill_all, "warning");
        try {
          const res = await api.anonymousLogin(token, pin);
          api.setToken(res.data.token);
          api.setUser(res.data.user);
          await loadReport();
          showSection("sectionReport");
        } catch (err) {
          Swal.fire(L.error_title, L.err_login_failed, "error");
        }
      }

      async function loadReport() {
        const reports = await api.getReports();
        if (!reports.data.reports.length) return;
        const ref = reports.data.reports[0].reference_number;
        const detail = await api.getReport(ref);
        currentReport = detail.data;
        renderReport(currentReport);
        await loadMessages(ref);
        await loadAttachments(ref);
      }

      function renderReport(report) {
        const statusMap = {
          received: L.status_received,
          reviewing: L.status_reviewing,
          clarification: L.status_clarification,
          closed: L.status_closed,
        };
        const catMap = {
          fraud: L.cat_fraud,
          harassment: L.cat_harassment,
          safety: L.cat_safety,
          discrimination: L.cat_discrimination,
          other: L.cat_other,
        };
        const statusClass = {
          received: "status-received",
          reviewing: "status-reviewing",
          clarification: "status-clarification",
          closed: "status-closed",
        };

        document.getElementById("reportRef").textContent =
          report.reference_number;
        document.getElementById("reportSubject").textContent = report.subject;
        document.getElementById("reportStatus").innerHTML =
          '<span class="status-badge ' +
          (statusClass[report.status] || "") +
          '">' +
          (statusMap[report.status] || report.status) +
          "</span>";
        document.getElementById("reportCategory").textContent =
          catMap[report.category] || report.category;
        document.getElementById("reportDate").textContent = report.incident_date
          ? report.incident_date.split("T")[0]
          : "—";
        document.getElementById("reportLocation").textContent =
          report.incident_location || "—";
        document.getElementById("reportPersons").textContent =
          report.involved_persons || "—";
        document.getElementById("reportDescription").textContent =
          report.description;

        const isClosed = report.status === "closed";
        document.getElementById("messageInputRow").style.display = isClosed
          ? "none"
          : "flex";
      }

      async function loadMessages(ref) {
        try {
          const res = await api.getMessages(ref);
          const thread = document.getElementById("messageThread");
          const messages = res.data.messages;

          if (!messages.length) {
            thread.innerHTML =
              '<div class="empty-state">' + L.no_messages + "</div>";
            return;
          }

          thread.innerHTML = messages
            .map((m) => {
              const isAdmin = m.sender_role === "admin";
              const time = new Date(m.created_at).toLocaleString(
                currentLang === "de" ? "de-DE" : "en-GB",
                {
                  day: "2-digit",
                  month: "2-digit",
                  year: "numeric",
                  hour: "2-digit",
                  minute: "2-digit",
                },
              );
              return (
                '<div class="message-bubble ' +
                (isAdmin ? "message-admin" : "message-whistleblower") +
                '">' +
                m.body +
                '<div class="message-time">' +
                time +
                "</div>" +
                "</div>"
              );
            })
            .join("");

          thread.scrollTop = thread.scrollHeight;
        } catch (e) {
          console.warn("Messages load failed:", e);
        }
      }

      async function loadAttachments(ref) {
        try {
          const res = await api.getAttachments(ref);
          const list = document.getElementById("attachmentList");
          const attachments = res.data.attachments;

          if (!attachments.length) {
            list.innerHTML =
              '<div class="empty-state">' + L.no_attachments + "</div>";
            return;
          }

          list.innerHTML = attachments
            .map((a) => {
              const size = (a.size / 1024).toFixed(1) + " KB";
              return (
                '<div class="attachment-item">' +
                '<span><i class="fa-solid fa-paperclip"></i> ' +
                a.original_filename +
                ' <small style="color:#999">(' +
                size +
                ")</small></span>" +
                "<button onclick=\"downloadAttachment('" +
                a.id +
                "', '" +
                a.original_filename +
                "')\">" +
                '<i class="fa-solid fa-download"></i> ' +
                L.download +
                "</button>" +
                "</div>"
              );
            })
            .join("");
        } catch (e) {
          console.warn("Attachments load failed:", e);
        }
      }

      async function sendMessage() {
        const input = document.getElementById("messageInput");
        const body = input.value.trim();
        if (!body) return;
        try {
          await api.sendMessage(currentReport.reference_number, body);
          input.value = "";
          await loadMessages(currentReport.reference_number);
        } catch (err) {
          Swal.fire(L.error_title, L.err_generic, "error");
        }
      }

      async function downloadAttachment(id, filename) {
        try {
          const res = await api.downloadAttachment(id);
          const url = window.URL.createObjectURL(new Blob([res.data]));
          const link = document.createElement("a");
          link.href = url;
          link.setAttribute("download", filename);
          document.body.appendChild(link);
          link.click();
          link.remove();
          window.URL.revokeObjectURL(url);
        } catch (e) {
          Swal.fire(L.error_title, L.err_generic, "error");
        }
      }

      async function uploadAttachment() {
        const file = document.getElementById("newAttachment").files[0];
        if (!file) return;
        try {
          await api.uploadAttachment(currentReport.reference_number, file);
          await loadAttachments(currentReport.reference_number);
        } catch (err) {
          Swal.fire(L.error_title, L.err_generic, "error");
        }
      }

      async function doLogout() {
        try {
          await api.logout();
        } catch (e) {}
        api.clearToken();
        showSection("sectionLogin");
      }

      applyLang();
    </script>
  </body>
</html>
