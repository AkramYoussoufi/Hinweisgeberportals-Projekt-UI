<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hinweisgeberportal</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="js/config.js"></script>
    <script src="js/lang/de.js"></script>
    <script src="js/api.js"></script>
    <link rel="stylesheet" href="css/custom.css" />
    <style>
      .reset-wrap {
        max-width: 440px;
        margin: 60px auto;
        padding: 0 24px;
      }
      .reset-card {
        background: #fff;
        border-radius: 10px;
        padding: 36px 32px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      }
      .reset-icon {
        width: 56px;
        height: 56px;
        background: #e8eaf6;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      .reset-icon i {
        font-size: 24px;
        color: #1a237e;
      }
      .reset-title {
        font-size: 20px;
        font-weight: 700;
        color: #1a237e;
        text-align: center;
        margin-bottom: 6px;
      }
      .reset-subtitle {
        font-size: 14px;
        color: #666;
        text-align: center;
        margin-bottom: 28px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #444;
        margin-bottom: 6px;
      }
      .form-group input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      .form-group input:focus {
        outline: none;
        border-color: #1a237e;
      }
      .btn-submit {
        width: 100%;
        padding: 12px;
        background: #1a237e;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s;
      }
      .btn-submit:hover {
        background: #283593;
      }
      .error-state {
        text-align: center;
        padding: 32px 0;
        color: #c62828;
      }
      .error-state i {
        font-size: 40px;
        margin-bottom: 12px;
        display: block;
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div class="logo">
        <i class="fa-solid fa-shield-halved"></i>
        <span data-i18n="app_name"></span>
      </div>
      <div class="header-actions">
        <button class="lang-switcher" onclick="switchLang()" data-i18n="lang_switch"></button>
      </div>
    </header>

    <div class="reset-wrap">
      <div class="reset-card" id="resetCard">
        <div class="reset-icon">
          <i class="fa-solid fa-lock-open"></i>
        </div>
        <h2 class="reset-title" data-i18n="reset_title"></h2>
        <p class="reset-subtitle" data-i18n="reset_subtitle"></p>

        <div class="form-group">
          <label data-i18n="label_new_password"></label>
          <input
            type="password"
            id="newPassword"
            data-i18n-placeholder="placeholder_min8"
            autocomplete="new-password"
          />
        </div>
        <div class="form-group">
          <label data-i18n="label_confirm_password"></label>
          <input
            type="password"
            id="confirmPassword"
            data-i18n-placeholder="placeholder_password"
            autocomplete="new-password"
            onkeypress="if (event.key === 'Enter') doReset();"
          />
        </div>

        <button class="btn-submit" onclick="doReset()" data-i18n="btn_reset_password"></button>
      </div>
    </div>

    <script>
      api.init();

      const params = new URLSearchParams(window.location.search);
      const resetToken = params.get("token");
      const resetEmail = params.get("email");

      let currentLang = localStorage.getItem("lang") || "de";

      const L = {
        de: {
          app_name: "Hinweisgeberportal",
          lang_switch: "EN",
          reset_title: "Neues Passwort setzen",
          reset_subtitle: "Geben Sie Ihr neues Passwort ein.",
          label_new_password: "Neues Passwort",
          label_confirm_password: "Passwort bestätigen",
          placeholder_min8: "Mind. 8 Zeichen",
          placeholder_password: "••••••••",
          btn_reset_password: "Passwort zurücksetzen",
          err_fill_all: "Bitte füllen Sie alle Felder aus.",
          err_passwords_mismatch: "Die Passwörter stimmen nicht überein.",
          err_invalid_token: "Der Link ist ungültig oder abgelaufen.",
          err_generic: "Ein Fehler ist aufgetreten.",
          error_title: "Fehler",
          warning_title: "Hinweis",
          success_title: "Passwort geändert",
          success_text: "Ihr Passwort wurde erfolgreich geändert. Sie können sich jetzt anmelden.",
          no_token_title: "Ungültiger Link",
          no_token_text: "Dieser Link ist ungültig. Bitte fordern Sie einen neuen an.",
        },
        en: {
          app_name: "Whistleblower Portal",
          lang_switch: "DE",
          reset_title: "Set New Password",
          reset_subtitle: "Enter your new password below.",
          label_new_password: "New Password",
          label_confirm_password: "Confirm Password",
          placeholder_min8: "Min. 8 characters",
          placeholder_password: "••••••••",
          btn_reset_password: "Reset Password",
          err_fill_all: "Please fill in all fields.",
          err_passwords_mismatch: "Passwords do not match.",
          err_invalid_token: "This link is invalid or has expired.",
          err_generic: "An error occurred.",
          error_title: "Error",
          warning_title: "Warning",
          success_title: "Password Changed",
          success_text: "Your password has been changed successfully. You can now log in.",
          no_token_title: "Invalid Link",
          no_token_text: "This link is invalid. Please request a new one.",
        },
      };

      let T = L[currentLang] || L.de;

      function applyLang() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (T[key] !== undefined) el.textContent = T[key];
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
          const key = el.getAttribute("data-i18n-placeholder");
          if (T[key] !== undefined) el.placeholder = T[key];
        });
        document.title = T.app_name;
      }

      function switchLang() {
        currentLang = currentLang === "de" ? "en" : "de";
        T = L[currentLang];
        localStorage.setItem("lang", currentLang);
        applyLang();
      }

      async function doReset() {
        const password = document.getElementById("newPassword").value;
        const confirm = document.getElementById("confirmPassword").value;

        if (!password || !confirm)
          return Swal.fire(T.warning_title, T.err_fill_all, "warning");
        if (password !== confirm)
          return Swal.fire(T.warning_title, T.err_passwords_mismatch, "warning");
        if (password.length < 8)
          return Swal.fire(T.warning_title, T.placeholder_min8, "warning");

        try {
          await api.resetPassword(resetEmail, resetToken, password, password);
          await Swal.fire({
            icon: "success",
            title: T.success_title,
            text: T.success_text,
            confirmButtonColor: "#1a237e",
          });
          window.location.href = "index.html";
        } catch (err) {
          const msg = err.response?.data?.message || T.err_generic;
          const isExpired = err.response?.status === 422;
          Swal.fire(T.error_title, isExpired ? T.err_invalid_token : msg, "error");
        }
      }

      applyLang();

      // Show error if link is missing token or email
      if (!resetToken || !resetEmail) {
        document.getElementById("resetCard").innerHTML =
          '<div class="error-state">' +
          '<i class="fa-solid fa-triangle-exclamation"></i>' +
          "<strong>" + T.no_token_title + "</strong>" +
          "<p style='margin-top:8px;font-size:14px;color:#666'>" + T.no_token_text + "</p>" +
          "</div>";
      }
    </script>
  </body>
</html>
